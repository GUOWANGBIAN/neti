<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETI 网络工程师人格测试 - 你是哪种网管？</title>
    <style>
        /* ==================== 全局样式变量 ==================== */
        :root {
            /* 主色调 - 科技蓝紫色渐变 */
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --primary-color: #6366f1;
            --primary-dark: #4f46e5;
            
            /* 辅助色 */
            --accent-cyan: #06b6d4;      /* 青色 - 架构维度 */
            --accent-orange: #f97316;    /* 橙色 - 实战维度 */
            --accent-pink: #ec4899;      /* 粉色 - 整活维度 */
            --accent-green: #10b981;     /* 绿色 - 背锅维度 */
            
            /* 中性色 */
            --bg-dark: #0f172a;          /* 深蓝黑背景 */
            --bg-card: #1e293b;          /* 卡片背景 */
            --bg-hover: #334155;         /* 悬停背景 */
            --text-primary: #f1f5f9;     /* 主文字色 */
            --text-secondary: #94a3b8;   /* 次要文字色 */
            --border-color: #475569;     /* 边框颜色 */
            
            /* 尺寸 */
            --container-max-width: 900px;
            --border-radius: 16px;
        }

        /* ==================== 基础重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* ==================== 主容器 - 适应浏览器高度 ==================== */
        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: var(--container-max-width);
            margin: 0 auto;
            padding: 20px;
        }

        /* ==================== 头部区域 ==================== */
        .header {
            text-align: center;
            padding: 30px 20px;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 2.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-weight: 800;
        }

        .header .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        /* ==================== 进度条 ==================== */
        .progress-container {
            background: var(--bg-card);
            border-radius: 10px;
            height: 8px;
            margin: 20px 0;
            overflow: hidden;
            flex-shrink: 0;
        }

        .progress-bar {
            background: var(--primary-gradient);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        /* ==================== 主内容区 - 自适应高度 ==================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px 0;
        }

        /* ==================== 欢迎页面 ==================== */
        .welcome-screen {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .welcome-screen h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .welcome-screen p {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .type-preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }

        .type-preview-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
        }

        .type-preview-card .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .type-preview-card h4 {
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 5px;
        }

        .type-preview-card p {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* ==================== 题目区域 ==================== */
        .question-screen {
            display: none;
            animation: slideIn 0.3s ease;
        }

        .question-screen.active {
            display: block;
        }

        .question-number {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .question-text {
            font-size: 1.4rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--text-primary);
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-card {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.5;
        }

        .option-card:hover {
            border-color: var(--primary-color);
            background: var(--bg-hover);
            transform: translateX(8px);
        }

        .option-card.selected {
            border-color: var(--primary-color);
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-color);
        }

        /* ==================== 题目选择器 ==================== */
        .question-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }

        .question-dot {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .question-dot:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .question-dot.answered {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .question-dot.current {
            border-color: var(--accent-cyan);
            color: var(--accent-cyan);
            font-weight: bold;
        }

        /* ==================== 结果页面 ==================== */
        .result-screen {
            display: none;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .result-screen.active {
            display: block;
        }

        .result-code {
            font-size: 4rem;
            font-weight: 900;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .result-name {
            font-size: 1.8rem;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .result-desc {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 30px;
            text-align: left;
            background: var(--bg-card);
            padding: 25px;
            border-radius: var(--border-radius);
        }

        /* ==================== 四维得分柱状图 ==================== */
        .scores-container {
            background: var(--bg-card);
            padding: 25px;
            border-radius: var(--border-radius);
            margin: 30px 0;
        }

        .scores-container h3 {
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .score-item {
            margin-bottom: 18px;
        }

        .score-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .score-label {
            color: var(--text-primary);
            font-weight: 600;
        }

        .score-value {
            color: var(--text-secondary);
        }

        .score-track {
            background: var(--bg-dark);
            height: 16px;
            border-radius: 8px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 8px;
            transition: width 1s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            color: white;
        }

        /* ==================== 按钮样式 ==================== */
        .btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            margin: 10px 0;
            width: 100%;
            max-width: 300px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
        }

        .btn-secondary {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            border-color: var(--primary-color);
        }

        .btn-download {
            background: linear-gradient(135deg, var(--accent-green) 0%, #059669 100%);
        }

        .btn-download:hover {
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.4);
        }

        /* ==================== 隐藏画布 ==================== */
        #reportCanvas {
            display: none;
        }

        /* ==================== 动画 ==================== */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ==================== 响应式适配 ==================== */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .question-text {
                font-size: 1.2rem;
            }

            .result-code {
                font-size: 3rem;
            }

            .result-name {
                font-size: 1.4rem;
            }

            .type-preview-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- 头部 -->
        <header class="header">
            <h1>🌐 NETI 网络人格测试</h1>
            <p class="subtitle">30 道玩梗题，测测你是哪种网管大神</p>
        </header>

        <!-- 进度条 -->
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 欢迎页 -->
            <div class="welcome-screen" id="welcomeScreen">
                <h2>发现你的网络人设</h2>
                <p>
                    NETI (Network Engineer Type Indicator) —— 网络工程师玩梗人格测试<br>
                    不是正经测试！包含删库跑路、物理断网、rm -rf 等经典操作<br>
                    30 道题，约 3 分钟，看看你是架构大师还是背锅侠
                </p>

                <div class="type-preview-grid">
                    <div class="type-preview-card">
                        <div class="icon">🏗️</div>
                        <h4>架构仙人</h4>
                        <p>张口就是微服务</p>
                    </div>
                    <div class="type-preview-card">
                        <div class="icon">🔥</div>
                        <h4>救火队长</h4>
                        <p>哪里有事往哪冲</p>
                    </div>
                    <div class="type-preview-card">
                        <div class="icon">🎭</div>
                        <h4>整活之王</h4>
                        <p>骚操作层出不穷</p>
                    </div>
                    <div class="type-preview-card">
                        <div class="icon">🛡️</div>
                        <h4>背锅宗师</h4>
                        <p>锅来如山倒</p>
                    </div>
                </div>

                <button class="btn" onclick="startTest()">开始整活</button>
            </div>

            <!-- 题目页 -->
            <div class="question-screen" id="questionScreen">
                <div class="question-number">第 <span id="currentNum">1</span> / 30 题</div>
                <div class="question-text" id="questionText"></div>
                <div class="options-grid" id="optionsGrid"></div>

                <!-- 题目导航 -->
                <div class="question-nav" id="questionNav"></div>
            </div>

            <!-- 结果页 -->
            <div class="result-screen" id="resultScreen">
                <div class="result-code" id="resultCode"></div>
                <div class="result-name" id="resultName"></div>
                <div class="result-desc" id="resultDesc"></div>

                <div class="scores-container" id="scoresContainer"></div>

                <button class="btn" onclick="restartTest()">再玩一次</button>
                <button class="btn btn-download" onclick="downloadReport()">📊 下载专属报告</button>
            </div>
        </main>
    </div>

    <!-- 报告画布 1080x1920 (9:16) -->
    <canvas id="reportCanvas" width="1080" height="1920"></canvas>

    <script>
        // ==================== 配置常量 ====================
        // 四大维度定义
        const DIMENSIONS = {
            ARCHITECT: { name: '架构指数', color: '#06b6d4', code: 'A', icon: '🏗️' },
            PRACTITIONER: { name: '救火指数', color: '#f97316', code: 'P', icon: '🔥' },
            PRANKSTER: { name: '整活指数', color: '#ec4899', code: 'Z', icon: '🎭' },
            BACKPOT: { name: '背锅指数', color: '#10b981', code: 'B', icon: '🛡️' }
        };

        // 网站 URL (用于生成二维码)
        const SITE_URL = window.location.href || 'https://neti.test';

        // ==================== 30 道玩梗题目 ====================
        const QUESTIONS = [
            // 架构维度 (A) - 1-8
            {
                text: "老板说要搞个'高可用'系统，你第一反应是？",
                options: [
                    { text: "先画个三层架构图，再谈其他", type: 'ARCHITECT' },
                    { text: "多买几台服务器不就完了", type: 'PRACTITIONER' },
                    { text: "在群里发个'收到，马上安排'", type: 'PRANKSTER' },
                    { text: "默默打开备份脚本检查一遍", type: 'BACKPOT' }
                ]
            },
            {
                text: "设计网络拓扑时，你喜欢用什么形状？",
                options: [
                    { text: "必须是标准的星型/树型/网状", type: 'ARCHITECT' },
                    { text: "能通就行，形状重要吗", type: 'PRACTITIONER' },
                    { text: "画成爱心形状给运维小姐姐看", type: 'PRANKSTER' },
                    { text: "随便画，反正最后都要改", type: 'BACKPOT' }
                ]
            },
            {
                text: "听到'云原生'三个字，你的感受是？",
                options: [
                    { text: "兴奋！终于能上 K8s 了", type: 'ARCHITECT' },
                    { text: "不就是换个地方跑容器吗", type: 'PRACTITIONER' },
                    { text: "先把简历更新了再说", type: 'PRANKSTER' },
                    { text: "又要背新锅了...", type: 'BACKPOT' }
                ]
            },
            {
                text: "IP 地址规划，你的风格是？",
                options: [
                    { text: "严格按业务/地域/功能划分 VLAN", type: 'ARCHITECT' },
                    { text: "192.168.1.x 走天下", type: 'PRACTITIONER' },
                    { text: "把老板生日设成网关地址", type: 'PRANKSTER' },
                    { text: "反正最后都会乱，随便分吧", type: 'BACKPOT' }
                ]
            },
            {
                text: "选择路由协议时，你会考虑？",
                options: [
                    { text: "OSPF/BGP 的收敛时间和扩展性", type: 'ARCHITECT' },
                    { text: "哪个配置简单用哪个", type: 'PRACTITIONER' },
                    { text: "静态路由，永不背叛", type: 'PRANKSTER' },
                    { text: "别选错，选错了全是我的锅", type: 'BACKPOT' }
                ]
            },
            {
                text: "如何看待网络分层设计？",
                options: [
                    { text: "核心 - 汇聚 - 接入，缺一不可", type: 'ARCHITECT' },
                    { text: "一层也能跑，为什么要三层", type: 'PRACTITIONER' },
                    { text: "我分层，你随意", type: 'PRANKSTER' },
                    { text: "分得越细，锅分得越散", type: 'BACKPOT' }
                ]
            },
            {
                text: "文档工作对你来说意味着？",
                options: [
                    { text: "设计的核心产出，必须完善", type: 'ARCHITECT' },
                    { text: "有这时间不如多敲几行命令", type: 'PRACTITIONER' },
                    { text: "复制粘贴上一份，改个日期", type: 'PRANKSTER' },
                    { text: "出事了能甩锅的唯一证据", type: 'BACKPOT' }
                ]
            },
            {
                text: "新技术涌现时，你的态度是？",
                options: [
                    { text: "深入研究原理和架构设计", type: 'ARCHITECT' },
                    { text: "等别人踩完坑我再上", type: 'PRACTITIONER' },
                    { text: "先在测试环境搞破坏试试", type: 'PRANKSTER' },
                    { text: "别找我，我没学过这个", type: 'BACKPOT' }
                ]
            },

            // 救火维度 (P) - 9-16
            {
                text: "凌晨 3 点收到告警短信，你怎么办？",
                options: [
                    { text: "分析日志，定位根因", type: 'ARCHITECT' },
                    { text: "秒回：'收到，马上处理'", type: 'PRACTITIONER' },
                    { text: "假装没看见，早上再说", type: 'PRANKSTER' },
                    { text: "心想：完了，又是我的锅", type: 'BACKPOT' }
                ]
            },
            {
                text: "网线被老鼠咬断了，你如何处理？",
                options: [
                    { text: "重新规划布线方案", type: 'ARCHITECT' },
                    { text: "换根线，5 分钟搞定", type: 'PRACTITIONER' },
                    { text: "买个捕鼠器放在机房", type: 'PRANKSTER' },
                    { text: "写报告：建议加强机房防鼠措施", type: 'BACKPOT' }
                ]
            },
            {
                text: "服务器宕机了，第一操作是？",
                options: [
                    { text: "查看系统日志和监控图表", type: 'ARCHITECT' },
                    { text: "重启试试，不行再重启", type: 'PRACTITIONER' },
                    { text: "先拍张照发朋友圈", type: 'PRANKSTER' },
                    { text: "回忆上次碰过这台机器是什么时候", type: 'BACKPOT' }
                ]
            },
            {
                text: "网络突然变慢，你的排查顺序是？",
                options: [
                    { text: "从应用层到物理层逐层分析", type: 'ARCHITECT' },
                    { text: "ping 一下，不通就换线", type: 'PRACTITIONER' },
                    { text: "问问大家是不是都在摸鱼看视频", type: 'PRANKSTER' },
                    { text: "希望没人发现是我昨天改的配置", type: 'BACKPOT' }
                ]
            },
            {
                text: "设备故障需要更换，你会？",
                options: [
                    { text: "借机优化整体架构", type: 'ARCHITECT' },
                    { text: "火速换好，恢复业务", type: 'PRACTITIONER' },
                    { text: "把旧设备摆桌上当纪念品", type: 'PRANKSTER' },
                    { text: "祈祷新设备别出问题", type: 'BACKPOT' }
                ]
            },
            {
                text: "遇到不懂的技术问题，你会？",
                options: [
                    { text: "查 RFC 文档和官方手册", type: 'ARCHITECT' },
                    { text: "百度/谷歌 + '怎么解决'", type: 'PRACTITIONER' },
                    { text: "在群里问：'有人遇到过吗'", type: 'PRANKSTER' },
                    { text: "装作在忙，等别人解决", type: 'BACKPOT' }
                ]
            },
            {
                text: "割接升级前，你最担心什么？",
                options: [
                    { text: "方案设计是否有遗漏", type: 'ARCHITECT' },
                    { text: "操作会不会手滑敲错命令", type: 'PRACTITIONER' },
                    { text: "能不能准时下班吃夜宵", type: 'PRANKSTER' },
                    { text: "出事了责任算谁的", type: 'BACKPOT' }
                ]
            },
            {
                text: "CLI 和 GUI，你更喜欢哪个？",
                options: [
                    { text: "CLI，精准控制效率高", type: 'PRACTITIONER' },
                    { text: "GUI，可视化方便给领导演示", type: 'ARCHITECT' },
                    { text: "都行，能让我少干活就好", type: 'PRANKSTER' },
                    { text: "哪个有操作日志用哪个", type: 'BACKPOT' }
                ]
            },

            // 整活维度 (Z) - 17-24
            {
                text: "如何优雅地'删库跑路'？",
                options: [
                    { text: "先做完整备份和审计准备", type: 'ARCHITECT' },
                    { text: "从来不敢，还要养家糊口", type: 'PRACTITIONER' },
                    { text: "rm -rf /* --no-preserve-root", type: 'PRANKSTER' },
                    { text: "听说有人这么干过，现在在踩缝纫机", type: 'BACKPOT' }
                ]
            },
            {
                text: "物理清除数据的正确方式是？",
                options: [
                    { text: "使用 DoD 标准擦除工具", type: 'ARCHITECT' },
                    { text: "格式化三遍应该够了", type: 'PRACTITIONER' },
                    { text: "锤子 + 微波炉，保证渣都不剩", type: 'PRANKSTER' },
                    { text: "让行政帮忙处理，留个单据", type: 'BACKPOT' }
                ]
            },
            {
                text: "剪断网线的最佳时机是？",

            {

            // 背锅维度 (B) - 25-30
            {

                    { text: "默默背锅，心想习惯了", type: 'BACKPOT' }
                ]
            },
            {
                text: "项目延期了，原因分析会上你说？",
                options: [
                    { text: "技术难点和风险评估不足", type: 'ARCHITECT' },
                    { text: "人手不够，活儿太多", type: 'PRACTITIONER' },

            },
            {

                options: [

                    { text: "上门排查，现场优化", type: 'PRACTITIONER' },
                    { text: "告诉客户这是'特性'不是 bug", type: 'PRANKSTER' },
                    { text: "道歉，承诺改进，继续道歉", type: 'BACKPOT' }
                ]
            },
            {
                text: "年终总结怎么写？",
                options: [
                    { text: "重点突出架构优化和技术创新", type: 'ARCHITECT' },
                    { text: "罗列处理的故障数和 SLA 达成率", type: 'PRACTITIONER' },
                    { text: "放几张加班吃泡面的照片", type: 'PRANKSTER' },
                    { text: "反思不足，展望改进", type: 'BACKPOT' }
                ]
            },
            {
                text: "如果有来生，你还做网管吗？",
                options: [
                    { text: "会，但要提前设计好人生架构", type: 'ARCHITECT' },
                    { text: "会，这行干惯了舍不得", type: 'PRACTITIONER' },
                    { text: "不会，我要去送外卖", type: 'PRANKSTER' },
                    { text: "会...吧，反正也没别的技能", type: 'BACKPOT' }
                ]
            }
        ];

        // ==================== 人格类型定义 ====================
        const PERSONALITY_TYPES = {
            AAAA: {
                code: 'AAAA',
                name: '架构仙人',
                desc: '你眼中的世界都是拓扑图。张口闭口"高可用""低耦合"，PPT 做得比代码好。相信只要架构设计得好，bug 就追不上你。缺点是容易陷入过度设计，简单的需求也能给你整出个微服务集群。',
                slogan: '万物皆可微服务'
            },
            PPPP: {
                code: 'PPPP',
                name: '救火队长',
                desc: '你是机房的活雷锋，哪里有告警往哪冲。重启大法好是你的信仰，胶带捆线是你的绝活。半夜三点秒回消息，周末随叫随到。建议：记得给自己买份保险。',
                slogan: '重启治百病'
            },
            ZZZZ: {
                code: 'ZZZZ',
                name: '整活之王',
                desc: '普通网管修电脑，你修电脑靠玄学。rm -rf 是你的艺术创作，锤子砸盘是你的行为艺术。群里发言永远带着表情包，能把故障报告写成段子。公司团建你是气氛担当，故障复盘你是单口相声演员。',
                slogan: '人生如戏，全靠演技'
            },
            BBBB: {
                code: 'BBBB',
                name: '背锅宗师',
                desc: '你不是在背锅，就是在去背锅的路上。"对不起"是你的口头禅，"我的问题"是你的座右铭。奇怪的是，虽然锅很多，但人缘特别好。可能因为大家都觉得：这人不抢功，靠谱！',
                slogan: '锅来如山倒，我来如山崩'
            },
            // 混合类型
            DEFAULT: {
                code: 'MIX',
                name: '六边形战士',
                desc: '你各项能力比较均衡，没有特别突出的短板，也没有特别亮眼的长板。是团队里的中坚力量，既能画图又能干活，偶尔整活也会背锅。平凡但不平庸，说的就是你。',
                slogan: '平平淡淡才是真'
            }
        };

        // ==================== 状态管理 ====================
        let currentQuestion = 0;
        let answers = new Array(QUESTIONS.length).fill(null);
        let scores = {
            ARCHITECT: 0,
            PRACTITIONER: 0,
            PRANKSTER: 0,
            BACKPOT: 0
        };

        // ==================== 核心函数 ====================
        
        /**
         * 开始测试
         */
        function startTest() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('questionScreen').classList.add('active');
            renderQuestion();
            renderQuestionNav();
            updateProgress();
        }

        /**
         * 渲染当前题目
         */
        function renderQuestion() {
            const q = QUESTIONS[currentQuestion];
            document.getElementById('currentNum').textContent = currentQuestion + 1;
            document.getElementById('questionText').textContent = q.text;

            const optionsHtml = q.options.map((opt, idx) => `
                <div class="option-card ${answers[currentQuestion] === idx ? 'selected' : ''}" 
                     onclick="selectOption(${idx})">
                    ${opt.text}
                </div>
            `).join('');

            document.getElementById('optionsGrid').innerHTML = optionsHtml;
        }

        /**
         * 渲染题目导航
         */
        function renderQuestionNav() {
            const navHtml = QUESTIONS.map((_, idx) => {
                let className = 'question-dot';
                if (answers[idx] !== null) className += ' answered';
                if (idx === currentQuestion) className += ' current';
                return `<div class="${className}" onclick="jumpToQuestion(${idx})">${idx + 1}</div>`;
            }).join('');
            document.getElementById('questionNav').innerHTML = navHtml;
        }

        /**
         * 选择选项
         */
        function selectOption(idx) {
            // 如果已经答过这题，先扣除之前的分数
            if (answers[currentQuestion] !== null) {
                const prevType = QUESTIONS[currentQuestion].options[answers[currentQuestion]].type;
                scores[prevType]--;
            }
            
            // 记录新答案并加分
            answers[currentQuestion] = idx;
            const selectedType = QUESTIONS[currentQuestion].options[idx].type;
            scores[selectedType]++;
            
            renderQuestion();
            renderQuestionNav();
            updateProgress();

            // 自动跳转下一题
            setTimeout(() => {
                if (currentQuestion < QUESTIONS.length - 1) {
                    currentQuestion++;
                    renderQuestion();
                    renderQuestionNav();
                } else {
                    showResult();
                }
            }, 250);
        }

        /**
         * 跳转到指定题目
         */
        function jumpToQuestion(idx) {
            // 如果已经答过当前这题，需要扣除之前的分数
            if (answers[currentQuestion] !== null) {
                const prevType = QUESTIONS[currentQuestion].options[answers[currentQuestion]].type;
                scores[prevType]--;
            }
            
            currentQuestion = idx;
            renderQuestion();
            renderQuestionNav();
        }

        /**
         * 更新进度条
         */
        function updateProgress() {
            const answered = answers.filter(a => a !== null).length;
            const percent = (answered / QUESTIONS.length) * 100;
            document.getElementById('progressBar').style.width = percent + '%';
        }

        /**
         * 显示结果
         */
        function showResult() {
            document.getElementById('questionScreen').classList.remove('active');
            document.getElementById('resultScreen').classList.add('active');
            document.getElementById('progressBar').style.width = '100%';

            // 计算结果
            const result = calculateResult();
            
            // 显示结果代码和名称
            document.getElementById('resultCode').textContent = result.code;
            document.getElementById('resultName').textContent = result.name;
            document.getElementById('resultDesc').textContent = result.desc;

            // 渲染得分柱状图
            renderScores();
        }

        /**
         * 计算测试结果
         */
        function calculateResult() {
            const total = QUESTIONS.length;
            const maxScore = Math.max(scores.ARCHITECT, scores.PRACTITIONER, scores.PRANKSTER, scores.BACKPOT);

            // 如果某一项明显突出 (超过 40%)
            if (maxScore >= total * 0.4) {
                if (scores.ARCHITECT === maxScore) return PERSONALITY_TYPES.AAAA;
                if (scores.PRACTITIONER === maxScore) return PERSONALITY_TYPES.PPPP;
                if (scores.PRANKSTER === maxScore) return PERSONALITY_TYPES.ZZZZ;
                if (scores.BACKPOT === maxScore) return PERSONALITY_TYPES.BBBB;
            }

            // 否则返回混合类型
            return PERSONALITY_TYPES.DEFAULT;
        }

        /**
         * 渲染得分柱状图
         */
        function renderScores() {
            const total = QUESTIONS.length;
            const colors = [
                DIMENSIONS.ARCHITECT.color,
                DIMENSIONS.PRACTITIONER.color,
                DIMENSIONS.PRANKSTER.color,
                DIMENSIONS.BACKPOT.color
            ];
            const keys = ['ARCHITECT', 'PRACTITIONER', 'PRANKSTER', 'BACKPOT'];

            const html = `
                <h3>四维能力分析</h3>
                ${keys.map((key, idx) => {
                    const score = scores[key];
                    const percent = Math.round((score / total) * 100);
                    return `
                        <div class="score-item">
                            <div class="score-header">
                                <span class="score-label">${DIMENSIONS[key].icon} ${DIMENSIONS[key].name}</span>
                                <span class="score-value">${score}/${total}</span>
                            </div>
                            <div class="score-track">
                                <div class="score-fill" style="width: ${percent}%; background: ${colors[idx]}">
                                    ${percent}%
                                </div>
                            </div>
                        </div>
                    `;
                }).join('')}
            `;

            document.getElementById('scoresContainer').innerHTML = html;
        }

        /**
         * 重新开始测试
         */
        function restartTest() {
            currentQuestion = 0;
            answers = new Array(QUESTIONS.length).fill(null);
            scores = { ARCHITECT: 0, PRACTITIONER: 0, PRANKSTER: 0, BACKPOT: 0 };
            
            document.getElementById('resultScreen').classList.remove('active');
            document.getElementById('welcomeScreen').style.display = 'block';
            document.getElementById('progressBar').style.width = '0%';
        }

        /**
         * 下载报告图片
         */
        function downloadReport() {
            const canvas = document.getElementById('reportCanvas');
            const ctx = canvas.getContext('2d');
            const result = calculateResult();

            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 背景渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0f172a');
            gradient.addColorStop(1, '#1e293b');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 顶部装饰
            ctx.fillStyle = '#6366f1';
            ctx.fillRect(0, 0, canvas.width, 8);

            // 标题
            ctx.fillStyle = '#f1f5f9';
            ctx.font = 'bold 72px PingFang SC, Microsoft YaHei';
            ctx.textAlign = 'center';
            ctx.fillText('NETI 网络人格测试报告', canvas.width / 2, 150);

            // 副标题
            ctx.fillStyle = '#94a3b8';
            ctx.font = '36px PingFang SC, Microsoft YaHei';
            ctx.fillText('发现你的网络人设', canvas.width / 2, 220);

            // 人格代码（大字）
            ctx.font = 'bold 200px PingFang SC, Microsoft YaHei';
            const codeGradient = ctx.createLinearGradient(0, 280, 0, 480);
            codeGradient.addColorStop(0, '#6366f1');
            codeGradient.addColorStop(1, '#8b5cf6');
            ctx.fillStyle = codeGradient;
            ctx.fillText(result.code, canvas.width / 2, 480);

            // 人格名称
            ctx.font = 'bold 64px PingFang SC, Microsoft YaHei';
            ctx.fillStyle = '#f1f5f9';
            ctx.fillText(result.name, canvas.width / 2, 580);

            // Slogan
            ctx.font = 'italic 32px PingFang SC, Microsoft YaHei';
            ctx.fillStyle = '#06b6d4';
            ctx.fillText(`"${result.slogan}"`, canvas.width / 2, 640);

            // 分割线
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(100, 700);
            ctx.lineTo(canvas.width - 100, 700);
            ctx.stroke();

            // 描述文本（自动换行）
            ctx.font = '32px PingFang SC, Microsoft YaHei';
            ctx.fillStyle = '#e2e8f0';
            const descLines = wrapText(ctx, result.desc, canvas.width - 200);
            let y = 780;
            descLines.forEach(line => {
                ctx.fillText(line, canvas.width / 2, y);
                y += 50;
            });

            // 四维得分
            const startY = y + 80;
            const barWidth = 600;
            const barHeight = 60;
            const gap = 50;
            const colors = ['#06b6d4', '#f97316', '#ec4899', '#10b981'];
            const names = ['架构指数', '救火指数', '整活指数', '背锅指数'];
            const icons = ['🏗️', '🔥', '🎭', '🛡️'];
            const keys = ['ARCHITECT', 'PRACTITIONER', 'PRANKSTER', 'BACKPOT'];

            ctx.font = 'bold 36px PingFang SC, Microsoft YaHei';
            ctx.fillStyle = '#f1f5f9';
            ctx.textAlign = 'left';
            ctx.fillText('四维能力分析', 100, startY - 30);

            keys.forEach((key, idx) => {
                const score = scores[key];
                const percent = (score / QUESTIONS.length) * 100;
                const yPos = startY + idx * (barHeight + gap);

                // 标签
                ctx.font = '32px PingFang SC, Microsoft YaHei';
                ctx.fillStyle = '#f1f5f9';
                ctx.fillText(`${icons[idx]} ${names[idx]}`, 100, yPos + 40);

                // 得分值
                ctx.font = '32px PingFang SC, Microsoft YaHei';
                ctx.fillStyle = '#94a3b8';
                ctx.textAlign = 'right';
                ctx.fillText(`${score}/${QUESTIONS.length} (${Math.round(percent)}%)`, canvas.width - 100, yPos + 40);

                // 轨道
                ctx.fillStyle = '#334155';
                ctx.roundRect(100, yPos + 10, barWidth, barHeight, 10);
                ctx.fill();

                // 进度条
                ctx.fillStyle = colors[idx];
                ctx.roundRect(100, yPos + 10, barWidth * (percent / 100), barHeight, 10);
                ctx.fill();
            });

            // 底部二维码区域
            const qrY = startY + 4 * (barHeight + gap) + 100;
            
            // 二维码背景框
            ctx.fillStyle = '#ffffff';
            ctx.roundRect(canvas.width / 2 - 200, qrY - 20, 400, 400, 20);
            ctx.fill();

            // 绘制简易二维码图案（模拟）
            ctx.fillStyle = '#000000';
            const qrSize = 360;
            const qrStartX = canvas.width / 2 - 180;
            const qrStartY = qrY;
            
            // 模拟二维码图案
            for (let i = 0; i < 21; i++) {
                for (let j = 0; j < 21; j++) {
                    // 定位图案（三个角）
                    const isFinderPattern = (i < 7 && j < 7) || (i < 7 && j > 13) || (i > 13 && j < 7);
                    if (isFinderPattern || Math.random() > 0.5) {
                        const size = qrSize / 21;
                        ctx.fillRect(qrStartX + j * size, qrStartY + i * size, size - 1, size - 1);
                    }
                }
            }

            // 二维码提示
            ctx.font = '28px PingFang SC, Microsoft YaHei';
            ctx.fillStyle = '#64748b';
            ctx.textAlign = 'center';
            ctx.fillText('扫码参与测试', canvas.width / 2, qrY + 440);

            // 底部信息
            ctx.font = '24px PingFang SC, Microsoft YaHei';
            ctx.fillStyle = '#64748b';
            ctx.fillText(SITE_URL, canvas.width / 2, canvas.height - 80);
            ctx.fillText('Generated by NETI Test', canvas.width / 2, canvas.height - 40);

            // 下载图片
            canvas.toBlob(blob => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `NETI-${result.code}-报告.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/png');
        }

        /**
         * 文本自动换行
         */
        function wrapText(ctx, text, maxWidth) {
            const words = text.split('');
            const lines = [];
            let currentLine = '';

            words.forEach(char => {
                const testLine = currentLine + char;
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && currentLine !== '') {
                    lines.push(currentLine);
                    currentLine = char;
                } else {
                    currentLine = testLine;
                }
            });
            lines.push(currentLine);
            return lines;
        }

        // Canvas roundRect 兼容
        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (w < 2 * r) r = w / 2;
                if (h < 2 * r) r = h / 2;
                this.moveTo(x + r, y);
                this.arcTo(x + w, y, x + w, y + h, r);
                this.arcTo(x + w, y + h, x, y + h, r);
                this.arcTo(x, y + h, x, y, r);
                this.arcTo(x, y, x + w, y, r);
                this.closePath();
                return this;
            };
        }
