<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETI - 网络工程师人格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #7c3aed;
            --accent: #06b6d4;
            --background: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
        }

        .container {
            background: var(--surface);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 800px;
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
            line-height: 1.6;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 15px;
            display: block;
        }

        .content {
            padding: 40px 30px;
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-text {
            text-align: right;
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 600;
        }

        .question-card {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .question-card.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .question-number {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .question-text {
            font-size: 1.4rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 30px;
            color: var(--text);
        }

        .options {
            display: grid;
            gap: 15px;
        }

        .option-btn {
            padding: 20px 25px;
            border: 2px solid var(--border);
            border-radius: 12px;
            background: var(--surface);
            cursor: pointer;
            text-align: left;
            font-size: 1rem;
            line-height: 1.5;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .option-btn:hover {
            border-color: var(--primary);
            background: #eff6ff;
            transform: translateX(5px);
        }

        .option-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .option-btn:hover::before {
            transform: scaleY(1);
        }

        .start-screen, .result-screen {
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
            margin-top: 30px;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(37, 99, 235, 0.5);
        }

        .result-type {
            font-size: 3rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            letter-spacing: 5px;
        }

        .result-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
        }

        .result-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-light);
            margin-bottom: 30px;
            text-align: left;
        }

        .traits {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .trait-card {
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--primary);
        }

        .trait-label {
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .trait-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text);
        }

        .dimension-bars {
            margin: 30px 0;
        }

        .dimension {
            margin-bottom: 20px;
        }

        .dimension-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .dimension-bar {
            height: 10px;
            background: var(--border);
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        .dimension-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 5px;
            transition: width 1s ease;
        }

        .dimension-center {
            position: absolute;
            left: 50%;
            top: 0;
            height: 100%;
            width: 2px;
            background: var(--text-light);
            transform: translateX(-50%);
            opacity: 0.3;
        }

        .career-suggestions {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            padding: 25px;
            border-radius: 12px;
            margin-top: 30px;
            text-align: left;
        }

        .career-suggestions h3 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: var(--primary-dark);
        }

        .career-list {
            list-style: none;
        }

        .career-list li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            line-height: 1.6;
        }

        .career-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--success);
            font-weight: bold;
        }

        .share-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid var(--border);
        }

        .share-section p {
            margin-bottom: 15px;
            color: var(--text-light);
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .header h1 {
                font-size: 2rem;
            }
            
            .logo {
                font-size: 3rem;
            }
            
            .content {
                padding: 30px 20px;
            }
            
            .question-text {
                font-size: 1.2rem;
            }
            
            .result-type {
                font-size: 2.5rem;
            }
        }

        .typing-effect {
            border-right: 3px solid var(--primary);
            animation: blink 0.7s infinite;
        }

        @keyframes blink {
            50% {
                border-color: transparent;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Start Screen -->
        <div id="startScreen" class="start-screen">
            <div class="header">
                <span class="logo">🌐</span>
                <h1>NETI 人格测试</h1>
                <p>Network Engineer Type Indicator<br>发现你的网络维护人格类型</p>

                    共 <strong>20 道题</strong>，预计耗时 <strong>5-8 分钟</strong>。
                </p>
                <p style="font-size: 0.95rem; color: var(--text-light); line-height: 1.6;">
                    💡 请根据你的第一反应选择最符合的选项，没有对错之分。<br>
                    🔧 测试结果将揭示你在网络维护中的独特优势和潜在发展方向。
                </p>
                <button class="btn-primary" onclick="startTest()">开始测试 →</button>
            </div>
        </div>

        <!-- Question Screen -->
        <div id="questionScreen" class="hidden">
            <div class="header">
                <span class="logo">🔍</span>
                <h1>NETI 测试</h1>
                <p>探索你的网络工程师人格</p>
            </div>

                    <div class="progress-bar">

                </div>
                
                <div id="questionsContainer"></div>
                
                <div style="text-align: center; margin-top: 30px;">

            </div>
        </div>

        <!-- Result Screen -->
        <div id="resultScreen" class="hidden">
            <div class="header">
                <span class="logo">🏆</span>
                <h1>测试结果</h1>
                <p>你的网络工程师人格类型</p>
            </div>
            <div class="content">
                <div class="result-type" id="resultType">----</div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-description" id="resultDescription"></div>
                
                <div class="traits" id="traitsContainer"></div>
                
                <div class="dimension-bars" id="dimensionBars"></div>
                
                <div class="career-suggestions" id="careerSuggestions">
                    <h3>🎯 适合的发展方向</h3>
                    <ul class="career-list" id="careerList"></ul>
                </div>
                
                <div class="share-section">
                    <p>💬 分享你的结果，看看同事们是什么类型！</p>
                    <button class="btn-primary" onclick="retakeTest()">重新测试 ↺</button>
                </div>
            </div>
        </div>
    </div>

                    "网络运维专家",
                    "应急响应工程师",
                    "现场技术支持",
                    "网络监控分析师",
                    "灾难恢复专员"
                ]
            },
            "ENFJ": {
                title: "团队协作者 (ENFJ)",
                description: "你是网络团队的粘合剂。擅长沟通协调，能够整合各方资源推动项目进展。你关注团队氛围和成员成长，善于将复杂的技术问题转化为易懂的语言，是天然的领导者。",
                traits: {
                    "优势": "沟通协调、团队管理、跨部门合作",
                    "特点": "以人为本、善于表达、富有同理心",
                    "适合": "项目管理、团队建设、客户沟通"
                },
                dimensions: {
                    "分析型": 55,
                    "创新型": 65,
                    "独立型": 45,
                    "严谨型": 60
                },
                careers: [
                    "网络项目经理",
                    "技术团队负责人",
                    "解决方案架构师",
                    "客户关系技术顾问",
                    "培训讲师"
                ]
            },
            "ISTJ": {
                title: "流程守护者 (ISTJ)",
                description: "你是网络质量的守门人。做事严谨细致，严格遵循规范和流程，确保每个环节都万无一失。你重视文档和记录，是团队中最值得信赖的稳定力量。",
                traits: {
                    "优势": "严谨细致、责任心强、执行力高",
                    "特点": "循规蹈矩、注重细节、可靠稳定",
                    "适合": "质量管理、流程优化、合规审计"
                },
                dimensions: {
                    "分析型": 70,
                    "创新型": 50,
                    "独立型": 60,
                    "严谨型": 90
                },
                careers: [
                    "网络质量工程师",
                    "流程规范专员",
                    "配置管理工程师",
                    "合规审计员",
                    "文档管理专家"
                ]
            }
        };

        let currentQuestion = 0;
        let answers = [];
        let typeScores = { A: 0, B: 0, C: 0, D: 0 };

        // 初始化测试
        function startTest() {
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('questionScreen').classList.remove('hidden');
            renderQuestions();
            updateProgress();
        }

        // 渲染问题
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = `question-card ${index === 0 ? 'active' : ''}`;
                card.id = `question-${index}`;
                
                let optionsHTML = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHTML += `
                        <button class="option-btn" onclick="selectOption(${index}, '${opt.type}', this)">
                            ${opt.text}
                        </button>
                    `;
                });
                
                card.innerHTML = `
                    <span class="question-number">问题 ${index + 1} / ${questions.length}</span>
                    <div class="question-text">${q.text}</div>
                    <div class="options">${optionsHTML}</div>
                `;
                
                container.appendChild(card);
            });
        }

        // 选择选项
        function selectOption(questionIndex, type, button) {
            // 移除同题其他选项的选中状态
            const card = document.getElementById(`question-${questionIndex}`);
            const buttons = card.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.style.borderColor = 'var(--border)';
                btn.style.background = 'var(--surface)';
            });
            
            // 设置当前选项为选中状态
            button.style.borderColor = 'var(--primary)';
            button.style.background = '#eff6ff';
            
            // 记录答案
            if (!answers[questionIndex]) {
                answers[questionIndex] = type;
                typeScores[type]++;
            } else {
                // 如果改变选择，更新分数
                const oldType = answers[questionIndex];
                typeScores[oldType]--;
                answers[questionIndex] = type;
                typeScores[type]++;
            }
            
            // 显示下一题按钮
            document.getElementById('nextBtn').style.display = 'inline-block';
        }

        // 下一题
        function nextQuestion() {
            if (!answers[currentQuestion]) {
                alert('请先选择一个选项！');
                return;
            }
            
            // 隐藏当前问题
            document.getElementById(`question-${currentQuestion}`).classList.remove('active');
            
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                // 显示下一题
                document.getElementById(`question-${currentQuestion}`).classList.add('active');
                updateProgress();
                document.getElementById('nextBtn').style.display = 'none';
            } else {
                // 显示结果
                showResult();
            }
        }

        // 更新进度
        function updateProgress() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `问题 ${currentQuestion + 1} / ${questions.length}`;
        }

        // 计算人格类型
        function calculateType() {
            // 根据四个维度的得分确定类型
            const scores = typeScores;
            
            // 简单的类型判定逻辑
            // A: 分析型 (Introverted + Thinking)
            // B: 行动型 (Extraverted + Sensing)
            // C: 协作型 (Extraverted + Feeling)
            // D: 规范型 (Introverted + Judging)
            
            let type = '';
            
            // E vs I
            type += (scores.B + scores.C) >= (scores.A + scores.D) ? 'E' : 'I';
            
            // S vs N
            type += (scores.A + scores.B) >= (scores.C + scores.D) ? 'N' : 'S';
            
            // T vs F
            type += (scores.A + scores.D) >= (scores.B + scores.C) ? 'T' : 'F';
            
            // J vs P
            type += (scores.D + scores.A) >= (scores.B + scores.C) ? 'J' : 'P';
            
            return type;
        }

        // 显示结果
        function showResult() {
            document.getElementById('questionScreen').classList.add('hidden');
            document.getElementById('resultScreen').classList.remove('hidden');
            
            const type = calculateType();
            const result = personalityTypes[type] || personalityTypes['INTP'];
            
            // 设置结果内容
            document.getElementById('resultType').textContent = type;
            document.getElementById('resultTitle').textContent = result.title;
            document.getElementById('resultDescription').textContent = result.description;
            
            // 设置特质
            const traitsContainer = document.getElementById('traitsContainer');
            traitsContainer.innerHTML = '';
            for (const [label, value] of Object.entries(result.traits)) {
                traitsContainer.innerHTML += `
                    <div class="trait-card">
                        <div class="trait-label">${label}</div>
                        <div class="trait-value">${value}</div>
                    </div>
                `;
            }
            
            // 设置维度条
            const dimensionBars = document.getElementById('dimensionBars');
            dimensionBars.innerHTML = '<h3 style="margin-bottom: 20px; font-size: 1.2rem;">📊 维度分析</h3>';
            for (const [dim, value] of Object.entries(result.dimensions)) {
                dimensionBars.innerHTML += `
                    <div class="dimension">
                        <div class="dimension-label">
                            <span>${dim}</span>
                            <span>${value}%</span>
                        </div>
                        <div class="dimension-bar">
                            <div class="dimension-center"></div>
                            <div class="dimension-fill" style="width: 0%" data-width="${value}%"></div>
                        </div>
                    </div>
                `;
            }
            
            // 设置职业建议
            const careerList = document.getElementById('careerList');
            careerList.innerHTML = '';
            result.careers.forEach(career => {
                careerList.innerHTML += `<li>${career}</li>`;
            });
            
            // 动画效果
            setTimeout(() => {
                const fills = document.querySelectorAll('.dimension-fill');
                fills.forEach(fill => {
                    fill.style.width = fill.getAttribute('data-width');
                });
            }, 100);
        }

        // 重新测试
        function retakeTest() {
            currentQuestion = 0;
            answers = [];
            typeScores = { A: 0, B: 0, C: 0, D: 0 };
            
            document.getElementById('resultScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('nextBtn').style.display = 'none';
        }

        // 键盘导航
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && document.getElementById('nextBtn').style.display !== 'none') {
                nextQuestion();
            }
        });
    </script>
</body>
</html>
